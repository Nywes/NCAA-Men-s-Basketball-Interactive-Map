<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Roster — propositions de design</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:14px/1.4 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#e9edf2;color:#1b2430;padding:24px}
  h1{font-size:21px;margin-bottom:4px}
  .sub{color:#64748b;font-size:13px;margin-bottom:24px;max-width:820px}
  .prop{margin-bottom:30px}
  .prop > h2{font-size:15px;font-weight:800;margin-bottom:2px}
  .prop > .d{font-size:11.5px;color:#64748b;margin-bottom:10px;max-width:560px}
  /* conteneur simulant le corps de la modale */
  .frame{width:420px;max-width:100%;background:#fff;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.14);overflow:hidden}
  .frame .bd{padding:12px;max-height:360px;overflow-y:auto}
  .frame .bd::-webkit-scrollbar{width:4px}.frame .bd::-webkit-scrollbar-thumb{background:#dbe2ea;border-radius:2px}
  :root{--team:#00539b;--teamd:#0a3d75;--tint:#b3cbe1}
  img.av{object-fit:cover;background:#dbe4f0;display:block}
  .muted{color:#64748b}

  /* A — compact rows (actuel) */
  .A .row{display:flex;align-items:center;gap:8px;padding:6px 8px;border:2px solid var(--team);border-radius:6px;background:#f9f9f9;margin-bottom:6px}
  .A img{width:40px;height:40px;border-radius:4px}
  .A .nm{font-weight:700}
  .A .meta{font-size:12px;color:#555;display:flex;gap:6px;margin-top:2px}

  /* B — tableau */
  .B table{width:100%;border-collapse:collapse;font-size:12px}
  .B th{background:var(--team);color:#fff;font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;padding:6px 6px;text-align:left}
  .B td{padding:5px 6px;border-bottom:1px solid #eef2f6}
  .B tr:hover td{background:#f5f8fb}
  .B .pl{display:flex;align-items:center;gap:7px;font-weight:700}
  .B img{width:26px;height:26px;border-radius:50%}
  .B .num{font-weight:900;color:var(--team);width:22px}

  /* C — cartes portrait (grille) */
  .C .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:9px}
  .C .card{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;text-align:center;background:#fff}
  .C .ph{position:relative;height:96px;background:var(--tint)}
  .C .ph img{width:100%;height:100%}
  .C .num{position:absolute;top:5px;left:6px;background:var(--team);color:#fff;font-weight:900;font-size:11px;border-radius:6px;padding:1px 6px}
  .C .b{padding:6px 5px}
  .C .nm{font-weight:800;font-size:12px;line-height:1.15}
  .C .meta{font-size:10px;color:#64748b;margin-top:2px}

  /* D — grosses cartes photo + numéro overlay */
  .D .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
  .D .card{position:relative;border-radius:12px;overflow:hidden;height:170px;background:var(--teamd)}
  .D .card img{width:100%;height:100%;object-fit:cover}
  .D .num{position:absolute;top:0;right:0;font-size:44px;font-weight:900;color:rgba(255,255,255,.22);line-height:1;padding:2px 8px}
  .D .grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(3,10,30,.92),transparent 55%)}
  .D .info{position:absolute;left:9px;right:9px;bottom:8px;color:#fff}
  .D .nm{font-weight:900;font-size:13px}
  .D .meta{font-size:10px;color:rgba(255,255,255,.7);margin-top:1px}
  .D .pos{position:absolute;top:8px;left:8px;background:rgba(255,255,255,.9);color:var(--teamd);font-weight:800;font-size:9px;padding:2px 6px;border-radius:6px}

  /* E — depth chart par poste */
  .E .grp{margin-bottom:10px}
  .E .gh{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--team);border-bottom:2px solid #eef2f6;padding-bottom:3px;margin-bottom:5px}
  .E .r{display:flex;align-items:center;gap:8px;padding:3px 2px}
  .E img{width:30px;height:30px;border-radius:50%}
  .E .num{font-weight:900;color:#94a3b8;width:22px;text-align:center}
  .E .nm{font-weight:700;font-size:13px}
  .E .meta{font-size:11px;color:#64748b;margin-left:auto}

  /* F — numéro géant */
  .F .r{display:flex;align-items:center;gap:10px;padding:7px 6px;border-bottom:1px solid #eef2f6}
  .F .num{font-size:30px;font-weight:900;color:var(--team);width:42px;text-align:center;line-height:1}
  .F img{width:38px;height:38px;border-radius:8px}
  .F .nm{font-weight:800}
  .F .meta{font-size:11px;color:#64748b;margin-top:1px}

  /* G — overlay façon Legends */
  .G .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .G .card{position:relative;height:120px;border-radius:10px;overflow:hidden;background:var(--tint)}
  .G .card img{width:100%;height:100%;object-fit:cover}
  .G .grad{position:absolute;bottom:0;left:0;right:0;height:46px;background:linear-gradient(to top,rgba(3,10,30,.85),transparent)}
  .G .info{position:absolute;left:7px;right:7px;bottom:5px;color:#fff}
  .G .nm{font-weight:800;font-size:11px}
  .G .meta{font-size:9px;color:rgba(255,255,255,.75)}
  .G .num{position:absolute;top:5px;left:6px;background:rgba(0,0,0,.45);color:#fff;font-weight:800;font-size:10px;border-radius:5px;padding:1px 5px}

  /* H — liste minimale dense */
  .H .r{display:flex;align-items:center;gap:8px;padding:4px 4px;border-bottom:1px solid #f1f5f9;font-size:12.5px}
  .H .num{font-weight:900;color:var(--team);width:24px;text-align:right}
  .H .nm{font-weight:700;flex:1}
  .H .pos{background:#eef2f6;color:#475569;font-weight:700;font-size:10px;border-radius:4px;padding:1px 5px}
  .H .meta{color:#94a3b8;font-size:11px}

  /* I — cartes avec bande couleur */
  .I .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
  .I .card{border:1px solid #e6ebf1;border-radius:10px;overflow:hidden;display:flex;align-items:stretch}
  .I .strip{width:6px;background:var(--team)}
  .I .in{display:flex;align-items:center;gap:9px;padding:8px 9px;flex:1;min-width:0}
  .I img{width:46px;height:46px;border-radius:8px}
  .I .nm{font-weight:800;font-size:13px}
  .I .meta{font-size:11px;color:#64748b;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
  .I .chip{background:#eef2f6;border-radius:4px;padding:0 5px;font-weight:600;color:#475569;font-size:10px}
</style>
</head>
<body>
<h1>Roster — 9 designs différents</h1>
<p class="sub">Chaque proposition affiche le même effectif (données ESPN : n°, poste, taille, poids, classe, ville/pays + drapeau) dans le corps de la modale (~420px, couleur Duke). Photos = silhouette placeholder. Dis-moi le(s) design(s) que tu préfères (on peut aussi mixer).</p>
<div id="root"></div>
<script>
const AV = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23dbe4f0'/%3E%3Ccircle cx='50' cy='40' r='19' fill='%239fb3c8'/%3E%3Cpath d='M18 92a32 32 0 0 1 64 0z' fill='%239fb3c8'/%3E%3C/svg%3E";
const R = [
  {n:'Cooper Flagg',num:2,pos:'F',ht:"6'9\"",wt:'205',cl:'Fr',city:'Newport, ME',flag:'🇺🇸'},
  {n:'Kon Knueppel',num:7,pos:'G',ht:"6'7\"",wt:'217',cl:'Fr',city:'Milwaukee, WI',flag:'🇺🇸'},
  {n:'Khaman Maluach',num:9,pos:'C',ht:"7'2\"",wt:'250',cl:'Fr',city:'Juba, Sud-Soudan',flag:'🇸🇸'},
  {n:'Tyrese Proctor',num:5,pos:'G',ht:"6'6\"",wt:'183',cl:'Jr',city:'Sydney, Australie',flag:'🇦🇺'},
  {n:'Sion James',num:14,pos:'G',ht:"6'6\"",wt:'220',cl:'Sr',city:'Atlanta, GA',flag:'🇺🇸'},
  {n:'Maliq Brown',num:1,pos:'F',ht:"6'9\"",wt:'210',cl:'Jr',city:'Charlottesville, VA',flag:'🇺🇸'},
  {n:'Patrick Ngongba',num:21,pos:'C',ht:"6'11\"",wt:'250',cl:'Fr',city:'Woodbridge, VA',flag:'🇺🇸'},
];
const posGroup = (p)=> p==='G'?'Guards':(p==='C'?'Centers':'Forwards');

function A(){return R.map(p=>`<div class="row"><img class="av" src="${AV}"><div style="min-width:0"><div class="nm">${p.n}</div><div class="meta"><span>${p.pos}</span><span>${p.ht}</span><span>n°${p.num}</span><span>${p.city} ${p.flag}</span></div></div></div>`).join('');}
function B(){return `<table><thead><tr><th>#</th><th>Joueur</th><th>Pos</th><th>Ht</th><th>Wt</th><th>Cl</th><th>Origine</th></tr></thead><tbody>`+R.map(p=>`<tr><td class="num">${p.num}</td><td><div class="pl"><img class="av" src="${AV}">${p.n}</div></td><td>${p.pos}</td><td>${p.ht}</td><td>${p.wt}</td><td>${p.cl}</td><td>${p.flag} ${p.city}</td></tr>`).join('')+`</tbody></table>`;}
function C(){return `<div class="grid">`+R.map(p=>`<div class="card"><div class="ph"><span class="num">${p.num}</span><img class="av" src="${AV}"></div><div class="b"><div class="nm">${p.n}</div><div class="meta">${p.pos} · ${p.ht} · ${p.cl}<br>${p.flag} ${p.city}</div></div></div>`).join('')+`</div>`;}
function D(){return `<div class="grid">`+R.map(p=>`<div class="card"><img class="av" src="${AV}"><span class="num">${p.num}</span><span class="pos">${p.pos}</span><div class="grad"></div><div class="info"><div class="nm">${p.n}</div><div class="meta">${p.ht} · ${p.wt} lbs · ${p.cl} ${p.flag}</div></div></div>`).join('')+`</div>`;}
function E(){const g={};R.forEach(p=>{(g[posGroup(p.pos)]=g[posGroup(p.pos)]||[]).push(p);});return Object.keys(g).map(k=>`<div class="grp"><div class="gh">${k}</div>`+g[k].map(p=>`<div class="r"><span class="num">${p.num}</span><img class="av" src="${AV}"><span class="nm">${p.n}</span><span class="meta">${p.ht} · ${p.cl} · ${p.flag}</span></div>`).join('')+`</div>`).join('');}
function F(){return R.map(p=>`<div class="r"><div class="num">${p.num}</div><img class="av" src="${AV}"><div style="min-width:0"><div class="nm">${p.n}</div><div class="meta">${p.pos} · ${p.ht} · ${p.wt} lbs · ${p.cl} · ${p.flag} ${p.city}</div></div></div>`).join('');}
function G(){return `<div class="grid">`+R.map(p=>`<div class="card"><img class="av" src="${AV}"><span class="num">n°${p.num}</span><div class="grad"></div><div class="info"><div class="nm">${p.n}</div><div class="meta">${p.pos} · ${p.ht} · ${p.flag}</div></div></div>`).join('')+`</div>`;}
function H(){return R.map(p=>`<div class="r"><span class="num">${p.num}</span><span class="nm">${p.n}</span><span class="pos">${p.pos}</span><span class="meta">${p.ht} · ${p.cl} · ${p.flag} ${p.city}</span></div>`).join('');}
function I(){return `<div class="grid">`+R.map(p=>`<div class="card"><div class="strip"></div><div class="in"><img class="av" src="${AV}"><div style="min-width:0"><div class="nm">${p.num!=null?'#'+p.num+' ':''}${p.n}</div><div class="meta"><span class="chip">${p.pos}</span><span class="chip">${p.ht}</span><span class="chip">${p.cl}</span><span>${p.flag} ${p.city}</span></div></div></div></div>`).join('')+`</div>`;}

const PROPS=[
  ['A — Lignes compactes (actuel)','Le rendu actuel, pour référence.',A],
  ['B — Tableau','Style feuille de stats : colonnes #, poste, taille, poids, classe, origine. Très dense et lisible.',B],
  ['C — Cartes portrait','Grille de petites cartes : photo en haut, nom + infos dessous, n° en pastille.',C],
  ['D — Grosses cartes photo','Photo pleine, gros n° en filigrane, poste en pastille, infos en overlay bas (façon fiche NBA).',D],
  ['E — Depth chart par poste','Regroupé par Guards / Forwards / Centers.',E],
  ['F — Numéro géant','Le n° de maillot mis en avant à gauche, puis nom + toutes les infos.',F],
  ['G — Overlay façon Legends','Cohérent avec l\'onglet Legends : photo + dégradé + nom en overlay.',G],
  ['H — Liste minimale dense','Une ligne par joueur, ultra-compact (n° · nom · poste · infos).',H],
  ['I — Cartes bande couleur','Cartes avec liseré aux couleurs de la fac + infos en chips.',I],
];
document.getElementById('root').innerHTML = PROPS.map(([t,d,fn])=>`<div class="prop"><h2>${t}</h2><div class="d">${d}</div><div class="frame ${t[0]}"><div class="bd">${fn()}</div></div></div>`).join('');
</script>
</body>
</html>
