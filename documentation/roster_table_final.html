<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Roster — tableau final + stats au clic</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:14px/1.4 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#e9edf2;color:#1b2430;padding:24px}
  h1{font-size:21px;margin-bottom:4px}
  .sub{color:#64748b;font-size:13px;margin-bottom:20px;max-width:820px}
  .prop{margin-bottom:34px}
  .prop > h2{font-size:15px;font-weight:800;margin-bottom:2px}
  .prop > .d{font-size:12px;color:#64748b;margin-bottom:11px;max-width:640px}
  .frame{width:460px;max-width:100%;background:#fff;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.13);overflow:hidden;padding:12px}
  img.av{object-fit:cover;background:#dbe4f0;display:block}
  :root{--team:#00539b;--teamd:#0a3d75;--tint:#eaf1f8}

  /* ---- Tableau (T2 solide, sans dégradé, anglais, sans couleur poste) ---- */
  table{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px}
  thead th{background:var(--team);color:#fff;font-size:9px;text-transform:uppercase;letter-spacing:.6px;padding:8px;text-align:left}
  thead th:first-child{border-top-left-radius:8px}thead th:last-child{border-top-right-radius:8px}
  tbody td{padding:7px 8px;border-bottom:1px solid #eef2f6;vertical-align:middle}
  .pl{display:flex;align-items:center;gap:8px}
  .pl img{width:28px;height:28px;border-radius:6px}
  .nm{font-weight:700}
  .num{font-weight:900;color:var(--team)}
  .mut{color:#64748b}
  .flag{width:15px;height:11px;object-fit:cover;border-radius:2px;vertical-align:-1px;margin-right:4px}

  /* rangée cliquable + chevron */
  tr.main{cursor:pointer}
  tr.main:hover td{background:#f2f7fc}
  tr.main.open td{background:var(--tint)}
  .chev{transition:transform .28s ease;color:#94a3b8;font-size:11px}
  tr.main.open .chev{transform:rotate(90deg);color:var(--team)}

  /* panneau qui glisse */
  .exp td{padding:0;border:none}
  .wrap{max-height:0;overflow:hidden;transition:max-height .34s ease}
  tr.main.open + .exp .wrap{max-height:240px}
  .panel{background:var(--tint);border-bottom:1px solid #dbe7f3;padding:12px 14px}
  .season{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:#7c93ab;margin-bottom:9px;font-weight:800}
  .loading{font-size:12px;color:#7c93ab;padding:4px 0}

  /* Style 1 : 3 stats phares + grille */
  .hero{display:flex;gap:10px;margin-bottom:10px}
  .hero .s{flex:1;background:#fff;border-radius:9px;padding:8px 4px;text-align:center;box-shadow:0 1px 3px rgba(0,40,90,.06)}
  .hero .v{font-size:20px;font-weight:900;color:var(--team);line-height:1}
  .hero .l{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#7c93ab;margin-top:3px}
  .gridst{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .gridst .s{background:#fff;border-radius:7px;padding:5px 2px;text-align:center}
  .gridst .v{font-size:12.5px;font-weight:800;color:#1b2430}
  .gridst .l{font-size:8.5px;text-transform:uppercase;letter-spacing:.4px;color:#94a3b8;margin-top:1px}

  /* Style 2 : bande horizontale */
  .strip{display:flex;flex-wrap:wrap;gap:0;background:#fff;border-radius:9px;overflow:hidden;box-shadow:0 1px 3px rgba(0,40,90,.06)}
  .strip .s{flex:1;min-width:52px;text-align:center;padding:8px 4px;border-right:1px solid #eef2f6}
  .strip .s:last-child{border-right:none}
  .strip .v{font-size:15px;font-weight:900;color:#1b2430}
  .strip .v b{color:var(--team)}
  .strip .l{font-size:8.5px;text-transform:uppercase;letter-spacing:.4px;color:#94a3b8;margin-top:2px}
</style>
</head>
<body>
<h1>Roster — tableau final + stats au clic</h1>
<p class="sub">Tableau <b>T2 sans dégradé</b> (en-tête bleu plein), en <b>anglais</b> (colonne <b>Class</b> = Fr/So/Jr/Sr), <b>sans couleur de poste</b>. <b>Clique une ligne</b> → ses stats glissent en dessous (ici données d'exemple ; en vrai, 1 appel API ESPN au clic). Deux styles de panneau au choix.</p>
<div id="root"></div>
<script>
const AV="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23dbe4f0'/%3E%3Ccircle cx='50' cy='40' r='19' fill='%239fb3c8'/%3E%3Cpath d='M18 92a32 32 0 0 1 64 0z' fill='%239fb3c8'/%3E%3C/svg%3E";
function F(cc){return "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 3 2'%3E%3Crect width='3' height='2' fill='"+cc+"'/%3E%3C/svg%3E";}
const R=[
 {n:'Cooper Flagg',num:2,pos:'F',ht:"6' 9\"",cl:'Fr',city:'Newport, ME',flag:F('%23b22234'),
  st:{gp:38,pts:19.2,reb:7.5,ast:4.2,min:30.7,fgp:48.1,tpp:38.5,ftp:84.0,stl:1.4,blk:1.4}},
 {n:'Kon Knueppel',num:7,pos:'G',ht:"6' 7\"",cl:'Fr',city:'Milwaukee, WI',flag:F('%23b22234'),
  st:{gp:39,pts:14.4,reb:4.0,ast:2.7,min:31.1,fgp:47.9,tpp:40.6,ftp:91.4,stl:0.9,blk:0.2}},
 {n:'Khaman Maluach',num:9,pos:'C',ht:"7' 2\"",cl:'Fr',city:'Juba, South Sudan',flag:F('%230f47af'),
  st:{gp:39,pts:8.6,reb:6.6,ast:0.2,min:21.3,fgp:71.2,tpp:0.0,ftp:76.6,stl:0.5,blk:1.3}},
 {n:'Tyrese Proctor',num:5,pos:'G',ht:"6' 6\"",cl:'Jr',city:'Sydney, Australia',flag:F('%2300008b'),
  st:{gp:39,pts:12.4,reb:3.3,ast:2.0,min:32.9,fgp:45.0,tpp:40.5,ftp:73.2,stl:1.0,blk:0.2}},
 {n:'Sion James',num:14,pos:'G',ht:"6' 6\"",cl:'Sr',city:'Atlanta, GA',flag:F('%23b22234'),
  st:{gp:38,pts:8.6,reb:4.2,ast:2.6,min:27.4,fgp:54.1,tpp:41.3,ftp:68.2,stl:1.2,blk:0.4}},
 {n:'Maliq Brown',num:1,pos:'F',ht:"6' 9\"",cl:'Jr',city:'Charlottesville, VA',flag:F('%23b22234'),
  st:{gp:33,pts:4.2,reb:4.9,ast:1.7,min:16.1,fgp:66.0,tpp:0.0,ftp:52.9,stl:1.4,blk:0.7}},
];

function heroPanel(s){
  return '<div class="season">2025-26 · Season averages</div>'
   +'<div class="hero">'
   +'<div class="s"><div class="v">'+s.pts.toFixed(1)+'</div><div class="l">PPG</div></div>'
   +'<div class="s"><div class="v">'+s.reb.toFixed(1)+'</div><div class="l">RPG</div></div>'
   +'<div class="s"><div class="v">'+s.ast.toFixed(1)+'</div><div class="l">APG</div></div>'
   +'</div>'
   +'<div class="gridst">'
   +'<div class="s"><div class="v">'+s.gp+'</div><div class="l">GP</div></div>'
   +'<div class="s"><div class="v">'+s.min.toFixed(1)+'</div><div class="l">MIN</div></div>'
   +'<div class="s"><div class="v">'+s.fgp.toFixed(1)+'</div><div class="l">FG%</div></div>'
   +'<div class="s"><div class="v">'+s.tpp.toFixed(1)+'</div><div class="l">3P%</div></div>'
   +'<div class="s"><div class="v">'+s.ftp.toFixed(1)+'</div><div class="l">FT%</div></div>'
   +'<div class="s"><div class="v">'+s.stl.toFixed(1)+'</div><div class="l">STL</div></div>'
   +'<div class="s"><div class="v">'+s.blk.toFixed(1)+'</div><div class="l">BLK</div></div>'
   +'<div class="s"><div class="v">'+((s.pts+s.reb+s.ast)).toFixed(1)+'</div><div class="l">P+R+A</div></div>'
   +'</div>';
}
function stripPanel(s){
  function c(v,l,hl){return '<div class="s"><div class="v">'+(hl?'<b>'+v+'</b>':v)+'</div><div class="l">'+l+'</div></div>';}
  return '<div class="season">2025-26 · Season averages</div>'
   +'<div class="strip">'
   +c(s.pts.toFixed(1),'PPG',1)+c(s.reb.toFixed(1),'RPG',1)+c(s.ast.toFixed(1),'APG',1)
   +c(s.min.toFixed(1),'MIN')+c(s.fgp.toFixed(1),'FG%')+c(s.tpp.toFixed(1),'3P%')+c(s.stl.toFixed(1),'STL')+c(s.blk.toFixed(1),'BLK')
   +'</div>';
}

function buildTable(id,panelFn){
  var rows=R.map(function(p,i){
    return '<tr class="main" data-t="'+id+'" data-i="'+i+'">'
      +'<td class="num">'+p.num+'</td>'
      +'<td><div class="pl"><img class="av" src="'+AV+'"><span class="nm">'+p.n+'</span></div></td>'
      +'<td>'+p.pos+'</td>'
      +'<td class="mut">'+p.ht+'</td>'
      +'<td class="mut">'+p.cl+'</td>'
      +'<td class="mut"><img class="flag" src="'+p.flag+'">'+p.city+'</td>'
      +'<td style="text-align:right"><span class="chev">▶</span></td>'
      +'</tr>'
      +'<tr class="exp"><td colspan="7"><div class="wrap"><div class="panel">'+panelFn(p.st)+'</div></div></td></tr>';
  }).join('');
  return '<table><thead><tr><th>#</th><th>Player</th><th>Pos</th><th>Height</th><th>Class</th><th>Hometown</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
}

var PROPS=[
 ['Style 1 — 3 stats phares + grille détail','Clique une ligne : PPG/RPG/APG en gros, puis GP, MIN, FG%, 3P%, FT%, STL, BLK.',heroPanel],
 ['Style 2 — bande horizontale','Toutes les stats sur une seule ligne compacte (PPG/RPG/APG mis en avant en bleu).',stripPanel],
];
document.getElementById('root').innerHTML=PROPS.map(function(P){
  return '<div class="prop"><h2>'+P[0]+'</h2><div class="d">'+P[1]+'</div><div class="frame">'+buildTable(P[0],P[2])+'</div></div>';
}).join('');

// clic sur une ligne -> ouvre/ferme le panneau (une seule ouverte par tableau)
document.querySelectorAll('tr.main').forEach(function(row){
  row.addEventListener('click',function(){
    var open=row.classList.contains('open');
    var t=row.getAttribute('data-t');
    document.querySelectorAll('tr.main[data-t="'+t+'"].open').forEach(function(r){r.classList.remove('open');});
    if(!open) row.classList.add('open');
  });
});
</script>
</body>
</html>
