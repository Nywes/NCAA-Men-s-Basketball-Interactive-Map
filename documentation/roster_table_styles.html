<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Roster — tableaux jolis</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:14px/1.4 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#e9edf2;color:#1b2430;padding:24px}
  h1{font-size:21px;margin-bottom:4px}
  .sub{color:#64748b;font-size:13px;margin-bottom:8px;max-width:820px}
  .note{font-size:12px;color:#475569;background:#fff;border-left:3px solid #00539b;padding:6px 10px;border-radius:4px;margin-bottom:22px;max-width:560px}
  .prop{margin-bottom:30px}
  .prop > h2{font-size:15px;font-weight:800;margin-bottom:2px}
  .prop > .d{font-size:11.5px;color:#64748b;margin-bottom:10px;max-width:560px}
  .frame{width:430px;max-width:100%;background:#fff;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.13);overflow:hidden;padding:12px}
  img.av{object-fit:cover;background:#dbe4f0;display:block}
  :root{--team:#00539b;--teamd:#0a3d75;--tint:#eaf1f8}
  .pos{display:inline-block;font-weight:800;font-size:9.5px;border-radius:5px;padding:1px 6px}
  .pos.G{background:#e0edff;color:#1d4ed8}.pos.F{background:#e2f5e9;color:#15803d}.pos.C{background:#fdecd8;color:#b45309}

  /* T1 — moderne doux (zébré léger, sans bordures verticales) */
  .T1 table{width:100%;border-collapse:collapse;font-size:12.5px}
  .T1 th{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;text-align:left;padding:0 8px 7px;border-bottom:2px solid #eef2f6}
  .T1 td{padding:7px 8px;border-bottom:1px solid #f4f7fa}
  .T1 tbody tr:nth-child(even){background:#fafbfd}
  .T1 tr:hover td{background:#f2f7fc}
  .T1 .pl{display:flex;align-items:center;gap:8px}
  .T1 .pl img{width:30px;height:30px;border-radius:50%}
  .T1 .nm{font-weight:700}
  .T1 .num{font-weight:900;color:var(--team)}
  .T1 .mut{color:#64748b}

  /* T2 — header couleur équipe */
  .T2 table{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px;border-radius:10px;overflow:hidden}
  .T2 th{background:linear-gradient(135deg,var(--team),var(--teamd));color:#fff;font-size:9px;text-transform:uppercase;letter-spacing:.6px;padding:8px;text-align:left}
  .T2 td{padding:7px 8px;border-bottom:1px solid #eef2f6}
  .T2 tr:hover td{background:#eef5fb}
  .T2 .pl{display:flex;align-items:center;gap:8px}
  .T2 .pl img{width:28px;height:28px;border-radius:6px}
  .T2 .nm{font-weight:700}
  .T2 .num{font-weight:900;color:var(--team)}
  .T2 .mut{color:#64748b}

  /* T3 — lignes-cartes espacées */
  .T3 .head{display:grid;grid-template-columns:34px 1fr 42px 52px 40px;gap:8px;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;padding:0 10px 6px}
  .T3 .r{display:grid;grid-template-columns:34px 1fr 42px 52px 40px;gap:8px;align-items:center;background:#f7f9fc;border:1px solid #edf1f6;border-radius:9px;padding:6px 10px;margin-bottom:6px}
  .T3 .r:hover{border-color:var(--team);box-shadow:0 2px 8px rgba(0,83,155,.08)}
  .T3 .num{font-weight:900;color:var(--team);font-size:15px;text-align:center}
  .T3 .pl{display:flex;align-items:center;gap:8px;min-width:0}
  .T3 .pl img{width:32px;height:32px;border-radius:8px}
  .T3 .nm{font-weight:800;font-size:12.5px;line-height:1.1}
  .T3 .sub2{font-size:10px;color:#94a3b8}
  .T3 .c{font-size:11.5px;color:#475569;text-align:center}

  /* T4 — éditorial minimal */
  .T4 table{width:100%;border-collapse:collapse;font-size:13px}
  .T4 th{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#b0b8c4;text-align:left;padding:0 6px 9px;font-weight:700}
  .T4 td{padding:10px 6px;border-top:1px solid #f0f3f7}
  .T4 .pl{display:flex;align-items:center;gap:10px}
  .T4 .dot{width:8px;height:8px;border-radius:50%}
  .T4 .dot.G{background:#2563eb}.T4 .dot.F{background:#16a34a}.T4 .dot.C{background:#d97706}
  .T4 .nm{font-weight:700}
  .T4 .num{color:#c0c7d0;font-weight:800;font-size:12px}
  .T4 .mut{color:#8a94a3;font-size:12px}

  /* T5 — numéro en cercle + zébré */
  .T5 table{width:100%;border-collapse:collapse;font-size:12.5px}
  .T5 th{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;text-align:left;padding:0 8px 7px}
  .T5 tbody tr:nth-child(odd){background:#f6f9fc}
  .T5 td{padding:6px 8px}
  .T5 .circ{width:26px;height:26px;border-radius:50%;background:var(--team);color:#fff;font-weight:900;font-size:11px;display:flex;align-items:center;justify-content:center}
  .T5 .pl{display:flex;align-items:center;gap:8px}
  .T5 .pl img{width:28px;height:28px;border-radius:50%}
  .T5 .nm{font-weight:700}.T5 .mut{color:#64748b}

  /* T6 — header ardoise + pills poste colorés */
  .T6 table{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px}
  .T6 th{background:#1e293b;color:#cbd5e1;font-size:9px;text-transform:uppercase;letter-spacing:.6px;padding:8px;text-align:left}
  .T6 th:first-child{border-top-left-radius:9px}.T6 th:last-child{border-top-right-radius:9px}
  .T6 td{padding:7px 8px;border-bottom:1px solid #eef2f6}
  .T6 tbody tr:nth-child(even){background:#f8fafc}
  .T6 .pl{display:flex;align-items:center;gap:8px}
  .T6 .pl img{width:28px;height:28px;border-radius:6px}
  .T6 .nm{font-weight:700}.T6 .num{font-weight:900;color:#475569}.T6 .mut{color:#64748b}
</style>
</head>
<body>
<h1>Roster — versions « tableau joli »</h1>
<p class="sub">6 façons de rendre le tableau plus agréable. Même effectif, corps de modale ~430px.</p>
<p class="note"><b>« CL » = l'année d'études du joueur</b> — Fr (Freshman, 1re année), So (Sophomore), Jr (Junior), Sr (Senior). Renommée <b>« Année »</b> ici.</p>
<div id="root"></div>
<script>
const AV="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23dbe4f0'/%3E%3Ccircle cx='50' cy='40' r='19' fill='%239fb3c8'/%3E%3Cpath d='M18 92a32 32 0 0 1 64 0z' fill='%239fb3c8'/%3E%3C/svg%3E";
const R=[
 {n:'Cooper Flagg',num:2,pos:'F',ht:"6'9\"",cl:'Fr',city:'Newport, ME',flag:'🇺🇸'},
 {n:'Kon Knueppel',num:7,pos:'G',ht:"6'7\"",cl:'Fr',city:'Milwaukee, WI',flag:'🇺🇸'},
 {n:'Khaman Maluach',num:9,pos:'C',ht:"7'2\"",cl:'Fr',city:'Juba, S-Soudan',flag:'🇸🇸'},
 {n:'Tyrese Proctor',num:5,pos:'G',ht:"6'6\"",cl:'Jr',city:'Sydney, Australie',flag:'🇦🇺'},
 {n:'Sion James',num:14,pos:'G',ht:"6'6\"",cl:'Sr',city:'Atlanta, GA',flag:'🇺🇸'},
 {n:'Maliq Brown',num:1,pos:'F',ht:"6'9\"",cl:'Jr',city:'Charlottesville, VA',flag:'🇺🇸'},
];
const posPill=p=>`<span class="pos ${p}">${p}</span>`;

function T1(){return `<table><thead><tr><th>#</th><th>Joueur</th><th>Poste</th><th>Taille</th><th>Année</th><th>Origine</th></tr></thead><tbody>`+R.map(p=>`<tr><td class="num">${p.num}</td><td><div class="pl"><img class="av" src="${AV}"><span class="nm">${p.n}</span></div></td><td>${posPill(p.pos)}</td><td class="mut">${p.ht}</td><td class="mut">${p.cl}</td><td class="mut">${p.flag} ${p.city}</td></tr>`).join('')+`</tbody></table>`;}
function T2(){return `<table><thead><tr><th>#</th><th>Joueur</th><th>Poste</th><th>Taille</th><th>Année</th><th>Origine</th></tr></thead><tbody>`+R.map(p=>`<tr><td class="num">${p.num}</td><td><div class="pl"><img class="av" src="${AV}"><span class="nm">${p.n}</span></div></td><td>${p.pos}</td><td class="mut">${p.ht}</td><td class="mut">${p.cl}</td><td class="mut">${p.flag} ${p.city}</td></tr>`).join('')+`</tbody></table>`;}
function T3(){return `<div class="head"><div>#</div><div>Joueur</div><div>Poste</div><div>Taille</div><div>Année</div></div>`+R.map(p=>`<div class="r"><div class="num">${p.num}</div><div class="pl"><img class="av" src="${AV}"><div style="min-width:0"><div class="nm">${p.n}</div><div class="sub2">${p.flag} ${p.city}</div></div></div><div style="text-align:center">${posPill(p.pos)}</div><div class="c">${p.ht}</div><div class="c">${p.cl}</div></div>`).join('');}
function T4(){return `<table><thead><tr><th></th><th>Joueur</th><th>Poste</th><th>Taille</th><th>Année</th><th>Origine</th></tr></thead><tbody>`+R.map(p=>`<tr><td class="num">${p.num}</td><td><div class="pl"><span class="dot ${p.pos}"></span><span class="nm">${p.n}</span></div></td><td>${p.pos}</td><td class="mut">${p.ht}</td><td class="mut">${p.cl}</td><td class="mut">${p.flag} ${p.city}</td></tr>`).join('')+`</tbody></table>`;}
function T5(){return `<table><thead><tr><th>#</th><th>Joueur</th><th>Poste</th><th>Taille</th><th>Année</th><th>Origine</th></tr></thead><tbody>`+R.map(p=>`<tr><td><div class="circ">${p.num}</div></td><td><div class="pl"><img class="av" src="${AV}"><span class="nm">${p.n}</span></div></td><td>${posPill(p.pos)}</td><td class="mut">${p.ht}</td><td class="mut">${p.cl}</td><td class="mut">${p.flag} ${p.city}</td></tr>`).join('')+`</tbody></table>`;}
function T6(){return `<table><thead><tr><th>#</th><th>Joueur</th><th>Poste</th><th>Taille</th><th>Année</th><th>Origine</th></tr></thead><tbody>`+R.map(p=>`<tr><td class="num">${p.num}</td><td><div class="pl"><img class="av" src="${AV}"><span class="nm">${p.n}</span></div></td><td>${posPill(p.pos)}</td><td class="mut">${p.ht}</td><td class="mut">${p.cl}</td><td class="mut">${p.flag} ${p.city}</td></tr>`).join('')+`</tbody></table>`;}

const P=[
 ['T1 — Moderne doux','Sans bordures verticales, en-tête gris clair, zébrage très léger, survol bleuté, poste en pill coloré.',T1],
 ['T2 — En-tête couleur fac','Bandeau d\'en-tête dégradé aux couleurs de la fac, lignes fines.',T2],
 ['T3 — Lignes-cartes espacées','Chaque ligne est une petite carte arrondie avec un espace ; ville sous le nom. Plus aéré.',T3],
 ['T4 — Éditorial minimal','Sans photo, pastille de couleur par poste, beaucoup de blanc, nom en avant.',T4],
 ['T5 — Numéro en cercle','N° de maillot dans un rond couleur fac, zébrage.',T5],
 ['T6 — En-tête ardoise','Bandeau sombre + pills poste colorés (G/F/C).',T6],
];
document.getElementById('root').innerHTML=P.map(([t,d,fn])=>`<div class="prop"><h2>${t}</h2><div class="d">${d}</div><div class="frame ${t.split(' ')[0]}">${fn()}</div></div>`).join('');
</script>
</body>
</html>
