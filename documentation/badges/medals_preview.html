<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Médailles — fond du badge</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:14px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#e9edf2;color:#1b2430;padding:24px}
  h1{font-size:20px;margin-bottom:4px}
  .sub{color:#64748b;font-size:13px;margin-bottom:22px;max-width:800px}
  .ver{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:14px;box-shadow:0 3px 12px rgba(0,0,0,.08)}
  .ver h2{font-size:14px;margin-bottom:4px}
  .ver p{font-size:11px;color:#94a3b8;margin-bottom:11px}
  .badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .b{display:inline-flex;align-items:center;gap:5px;font-weight:700;border-radius:5px;white-space:nowrap;font-size:9.5px;padding:2.5px 8px 2.5px 5px}
  .b svg{width:14px;height:14px;flex-shrink:0}
</style>
</head>
<body>
<h1>Médaille (traitement 2) — quel fond de badge ?</h1>
<p class="sub">La médaille garde les couleurs du traitement 2 que tu as validées. On fait varier le <b>fond du chip</b> pour qu'elle ressorte (le souci était : chip et médaille de la même couleur). Dis-moi l'option A→E.</p>
<div id="root"></div>
<script>
const RINGS = [[27.9,44.9],[50,44.9],[72.1,44.9],[38.95,55.1],[61.05,55.1]];
function ringG(stroke){
  return '<g fill="none" stroke="'+stroke+'" stroke-width="1.7">'
    + RINGS.map(function(p){return '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="9.35"/>';}).join('')
    + '</g>';
}
function medal(c, halo){
  var h = halo ? '<circle cx="50" cy="50" r="48" fill="none" stroke="'+halo+'" stroke-width="4"/>' : '';
  return '<svg viewBox="0 0 100 100" width="14" height="14">'
    + h
    + '<circle cx="50" cy="50" r="46" fill="'+c.fill+'" stroke="'+c.rim+'" stroke-width="3"/>'
    + ringG(c.rings) + '</svg>';
}
// traitement 2
var M = {
  gold:   {fill:'#d4a017', rim:'#a87f1e', rings:'#f6e7a6'},
  silver: {fill:'#c0c5cb', rim:'#8a929b', rings:'#f1f3f5'},
  bronze: {fill:'#c77b3c', rim:'#8a5224', rings:'#eccbb0'},
};
var TXT = { gold:'Olympic Gold 2020, 2024', silver:'Olympic Silver 2008', bronze:'World Cup Bronze 1990' };
var ORDER = ['gold','silver','bronze'];

// chaque option renvoie {bg, color, border, halo?} pour un métal donné
var OPTS = [
  { name:'A — Chip métal FONCÉ, texte blanc', desc:'Fond plus sombre que la médaille → elle ressort en clair.',
    style:function(m){ return { bg:{gold:'#8a6c14',silver:'#6f767e',bronze:'#7a4a1e'}[m], color:'#fff', border:{gold:'#6f5710',silver:'#5b626a',bronze:'#633c18'}[m] }; } },
  { name:'B — Chip teinte CLAIRE, texte foncé', desc:'Fond pâle → la médaille colorée ressort.',
    style:function(m){ return { bg:{gold:'#f6ecc9',silver:'#eef0f2',bronze:'#f1ddc8'}[m], color:{gold:'#7a5e10',silver:'#4b5560',bronze:'#7a4a1e'}[m], border:{gold:'#e7d49a',silver:'#d3d8dd',bronze:'#e0c3a3'}[m] }; } },
  { name:'C — Chip ardoise neutre, texte blanc', desc:'Même chip gris pour toutes ; la couleur vient de la médaille (cohérent avec NCAA/NBA).',
    style:function(m){ return { bg:'#334155', color:'#fff', border:'#1e293b' }; } },
  { name:'D — Même couleur métal + halo clair autour de la médaille', desc:'On garde le chip couleur métal mais la médaille est cerclée d\'un liseré clair.',
    style:function(m){ return { bg:{gold:'#cda017',silver:'#9aa1a9',bronze:'#b06a30'}[m], color:'#fff', border:{gold:'#b08613',silver:'#828a93',bronze:'#935424'}[m], halo:{gold:'#fbf1c8',silver:'#ffffff',bronze:'#f3dcc4'}[m] }; } },
  { name:'E — Chip blanc + bord métal, texte foncé', desc:'Fond blanc, fine bordure couleur métal.',
    style:function(m){ return { bg:'#ffffff', color:{gold:'#8a6c14',silver:'#5b626a',bronze:'#7a4a1e'}[m], border:{gold:'#d4a017',silver:'#b6bbc1',bronze:'#c77b3c'}[m] }; } },
];

function badge(m, s){
  return '<span class="b" style="background:'+s.bg+';color:'+s.color+';border:1px solid '+s.border+'">'
    + medal(M[m], s.halo) + ' ' + TXT[m] + '</span>';
}

document.getElementById('root').innerHTML = OPTS.map(function(o){
  return '<div class="ver"><h2>'+o.name+'</h2><p>'+o.desc+'</p><div class="badges">'
    + ORDER.map(function(m){ return badge(m, o.style(m)); }).join('')
    + '</div></div>';
}).join('');
</script>
</body>
</html>
