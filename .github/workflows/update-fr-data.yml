name: Update French LNB data

on:
  schedule:
    # Tous les jours à 05h00 UTC (~07h00 Paris) : effectifs + classements LNB.
    - cron: '0 5 * * *'
  workflow_dispatch: {} # lancement manuel possible depuis l'onglet Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch rosters & standings from api-prod.lnb.fr
        run: node scripts/update-fr-data.js

      - name: Commit updated data (if changed)
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/fr-rosters.json src/fr-standings.json src/fr-teams.json
          if git diff --cached --quiet; then
            echo "Pas de changement de données."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: mise à jour auto des données LNB (rosters + classements)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Redéploie le site GitHub Pages avec les nouvelles données
      - name: Install dependencies
        if: steps.commit.outputs.changed == 'true'
        run: npm ci

      - name: Build
        if: steps.commit.outputs.changed == 'true'
        run: npm run build

      - name: Deploy to gh-pages
        if: steps.commit.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
