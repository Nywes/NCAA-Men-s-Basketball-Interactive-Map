name: Update French basketball data (LNB men + FFBB women)

on:
  schedule:
    # Tous les jours à 05h00 UTC (~07h00 Paris) : effectifs + classements LNB.
    - cron: '0 5 * * *'
  workflow_dispatch: {} # lancement manuel possible depuis l'onglet Actions

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch men's rosters & standings from api-prod.lnb.fr
        run: node scripts/update-fr-data.js

      - name: Fetch women's standings & clubs from api.ffbb.app
        run: node scripts/update-fr-women-data.js

      - name: Commit updated data (if changed)
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/fr-rosters.json src/fr-standings.json src/fr-teams.json src/fr-women-teams.json src/fr-women-standings.json
          if git diff --cached --quiet; then
            echo "Pas de changement de données."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: mise à jour auto des données LNB (rosters + classements)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Redéploie le site GitHub Pages avec les nouvelles données
      # (un commit fait avec GITHUB_TOKEN ne déclenche pas deploy.yml, donc on déploie ici aussi)
      - name: Install & build
        if: steps.commit.outputs.changed == 'true'
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
